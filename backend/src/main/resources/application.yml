spring:
  application:
    name: testcaseiq-api
  datasource:
    url: ${TESTCASEIQ_DATABASE_URL:jdbc:postgresql://localhost:5432/testcaseiq}
    username: ${TESTCASEIQ_DATABASE_USERNAME:testcaseiq}
    password: ${TESTCASEIQ_DATABASE_PASSWORD:testcaseiq_dev_password}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  ai:
    model:
      chat: ${AI_PROVIDER:mock}
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        model: ${OPENAI_MODEL:gpt-4o-mini}
        temperature: 0.1
        response-format:
          type: JSON_OBJECT

ai:
  provider: ${AI_PROVIDER:mock}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}

app:
  security:
    enforce-auth: ${TESTCASEIQ_SECURITY_ENFORCE_AUTH:false}
    jwt-secret: ${TESTCASEIQ_JWT_SECRET:testcaseiq-local-development-jwt-secret-change-me}
    access-token-expiration-seconds: ${TESTCASEIQ_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}

demo:
  mode: ${DEMO_MODE:false}

server:
  port: 8080
