spring:
  application:
    name: testcaseiq-api
  datasource:
    url: ${TESTCASEIQ_DATABASE_URL:jdbc:postgresql://localhost:5432/testcaseiq}
    username: ${TESTCASEIQ_DATABASE_USERNAME:testcaseiq}
    password: ${TESTCASEIQ_DATABASE_PASSWORD:testcaseiq_dev_password}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  ai:
    model:
      chat: ${AI_PROVIDER:mock}
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        model: ${OPENAI_MODEL:gpt-4o-mini}
        temperature: 0.1
        response-format:
          type: JSON_OBJECT
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.1

ai:
  provider: ${AI_PROVIDER:mock}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}

server:
  port: 8080
