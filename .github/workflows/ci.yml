name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Block committed environment files
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "Committed .env files are not allowed. Commit .env.example files only."
            exit 1
          fi

      - name: Block obvious OpenAI API keys
        shell: bash
        run: |
          if git grep -IEn 'sk-(proj|svcacct)-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{32,}' -- .; then
            echo "Possible OpenAI API key found in committed files."
            exit 1
          fi

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: secret-scan

    env:
      AI_PROVIDER: mock
      OPENAI_API_KEY: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24.15.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testcaseiq
          POSTGRES_USER: testcaseiq
          POSTGRES_PASSWORD: testcaseiq_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testcaseiq -d testcaseiq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AI_PROVIDER: mock
      OPENAI_API_KEY: ""
      TESTCASEIQ_DATABASE_URL: jdbc:postgresql://localhost:5432/testcaseiq
      TESTCASEIQ_DATABASE_USERNAME: testcaseiq
      TESTCASEIQ_DATABASE_PASSWORD: testcaseiq_dev_password
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 24.15.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Start backend
        shell: bash
        working-directory: backend
        run: |
          java -jar target/testcaseiq-api-0.0.1-SNAPSHOT.jar > ../backend-e2e.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../backend-e2e.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        shell: bash
        working-directory: frontend
        run: |
          npm start -- --host 0.0.0.0 > ../frontend-e2e.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:4200 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../frontend-e2e.log
          exit 1

      - name: Run Playwright e2e tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            backend-e2e.log
            frontend-e2e.log
          if-no-files-found: ignore
