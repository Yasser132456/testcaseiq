name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Block committed environment files
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "Committed .env files are not allowed. Commit .env.example files only."
            exit 1
          fi

      - name: Block obvious OpenAI API keys
        shell: bash
        run: |
          if git grep -IEn 'sk-(proj|svcacct)-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{32,}' -- .; then
            echo "Possible OpenAI API key found in committed files."
            exit 1
          fi

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: secret-scan

    env:
      AI_PROVIDER: mock
      OPENAI_API_KEY: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
